<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>粒子场</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="../shared/mp4-muxer.js"></script>
    <link rel="stylesheet" href="../shared/base.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&family=Orbitron:wght@900&display=swap" rel="stylesheet">

</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <a href="../index.html" class="btn-icon" title="返回首页" style="text-decoration:none; margin-right:8px; font-size:15px;">←</a>
            <div class="app-title">✨ 粒子场 <span style="font-size:9px; color:var(--text-sub)">v1.0</span></div>
            <div style="display:flex; align-items:center; gap:10px;">
                <button id="themeToggle" class="btn-icon" title="切换主题 (暗色/亮色)" style="font-size:13px;">☀</button>
                <div class="version-badge">NEW</div>
            </div>
        </div>

        <div class="controls-container">

            <div class="control-group">
                <div class="group-title">🔧 粒子参数</div>
                <div class="row stack">
                    <div class="label-line"><span>粒子数量</span><span id="CountVal">200</span></div>
                    <input type="range" id="CountInput" min="10" max="1000" step="10" value="200">
                </div>
                <div class="row stack">
                    <div class="label-line"><span>粒子大小</span><span id="SizeVal">3</span></div>
                    <input type="range" id="SizeInput" min="1" max="20" step="0.5" value="3">
                </div>
                <div class="row stack">
                    <div class="label-line"><span>运动速度</span><span id="SpeedVal">1.0</span></div>
                    <input type="range" id="SpeedInput" min="0.1" max="5" step="0.1" value="1.0">
                </div>
                <div class="row stack">
                    <div class="label-line"><span>连线距离</span><span id="LinkDistVal">120</span></div>
                    <input type="range" id="LinkDistInput" min="0" max="300" step="10" value="120">
                </div>
            </div>

            <div class="control-group">
                <div class="group-title">🎨 颜色设置</div>
                <div class="row">
                    <span style="font-size:12px; color:var(--text-sub, #888);">粒子颜色</span>
                    <input type="color" id="ColorInput" value="#00ffaa">
                </div>
                <div class="row stack">
                    <div class="label-line"><span>连线透明度</span><span id="LinkOpVal">0.3</span></div>
                    <input type="range" id="LinkOpInput" min="0" max="1" step="0.05" value="0.3">
                </div>
            </div>

            <!-- 背景和导出面板由 shared/controls.js 自动注入 -->
            <div id="shared-controls-placeholder"></div>

        </div>
    </div>

    <div class="preview-area">
        <div id="RecIndicator"><div class="rec-dot"></div> RECORDING</div>
        <canvas id="mainCanvas" class="effect-canvas"></canvas>
    </div>

    <script type="module">
        import { initEffect } from '../shared/controls.js';
        import { getTheme, toggleTheme } from '../shared/themes.js';

        const { ctx, canvas, baseWidth, baseHeight, clearFrame, drawBg, startPreviewLoop, lerp, hexToRgba, bindUI } = initEffect({
            canvasId: 'mainCanvas',
            defaultBgMode: 'transparent',
            fileName: 'ParticleField',
            onFrame: drawFrame,
        });

        const config = {
            count: 200,
            size: 3,
            speed: 1.0,
            linkDist: 120,
            color: '#00ffaa',
            linkOpacity: 0.3,
        };

        let particles = [];

        function initParticles() {
            particles = [];
            for (let i = 0; i < config.count; i++) {
                particles.push({
                    x: Math.random() * baseWidth,
                    y: Math.random() * baseHeight,
                    vx: (Math.random() - 0.5) * 2,
                    vy: (Math.random() - 0.5) * 2,
                });
            }
        }
        initParticles();

        function updateParticles(dt) {
            const speed = config.speed;
            for (const p of particles) {
                p.x += p.vx * speed * dt * 60;
                p.y += p.vy * speed * dt * 60;
                if (p.x < 0) p.x = baseWidth;
                if (p.x > baseWidth) p.x = 0;
                if (p.y < 0) p.y = baseHeight;
                if (p.y > baseHeight) p.y = 0;
            }
        }

        function drawFrame(timeMs) {
            clearFrame();
            drawBg(timeMs);
            updateParticles(1 / 60);

            if (config.linkDist > 0) {
                const maxDist = config.linkDist;
                ctx.strokeStyle = hexToRgba(config.color, config.linkOpacity);
                ctx.lineWidth = 1;
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < maxDist) {
                            ctx.globalAlpha = 1 - dist / maxDist;
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.stroke();
                        }
                    }
                }
                ctx.globalAlpha = 1;
            }

            ctx.fillStyle = config.color;
            for (const p of particles) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, config.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        startPreviewLoop(drawFrame);

        // 主题切换
        document.getElementById('themeToggle').addEventListener('click', () => {
            toggleTheme();
            document.getElementById('themeToggle').textContent = getTheme().id === 'dark' ? '☀' : '🌙';
        });
        document.getElementById('themeToggle').textContent = getTheme().id === 'dark' ? '☀' : '🌙';

        // === UI 绑定（bindUI 批量） ===
        bindUI(config, [
            ['CountInput',    'count',       'int',   'CountVal'],
            ['SizeInput',     'size',        'float', 'SizeVal'],
            ['SpeedInput',    'speed',       'float', 'SpeedVal'],
            ['LinkDistInput', 'linkDist',    'int',   'LinkDistVal'],
            ['ColorInput',    'color'],
            ['LinkOpInput',   'linkOpacity', 'float', 'LinkOpVal'],
        ], {
            onChange: (_, key) => {
                if (key === 'count') initParticles();
            }
        });
    </script>
</body>
</html>
